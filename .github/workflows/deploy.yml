name: Deploy to AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  APP_NAME: emp-mgmt
  ACCOUNT_ID: 448161422880

jobs:

# ─────────────────────────────
# 1. TEST
# ─────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm test


# ─────────────────────────────
# 2. TERRAFORM
# ─────────────────────────────
  terraform:
    needs: test
    runs-on: ubuntu-latest

    outputs:
      ecr_repo: ${{ steps.out.outputs.ecr_repo }}
      ecs_cluster: ${{ steps.out.outputs.ecs_cluster }}
      ecs_service: ${{ steps.out.outputs.ecs_service }}
      rds_identifier: ${{ steps.out.outputs.rds_identifier }}
      private_subnets: ${{ steps.out.outputs.private_subnets }}
      ecs_security_group_id: ${{ steps.out.outputs.ecs_security_group_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan

      - name: Capture outputs
        id: out
        working-directory: infra
        run: |
          set -e

          echo "ecr_repo=$(terraform output -raw ecr_repo)" >> $GITHUB_OUTPUT
          echo "ecs_cluster=$(terraform output -raw ecs_cluster)" >> $GITHUB_OUTPUT
          echo "ecs_service=$(terraform output -raw ecs_service)" >> $GITHUB_OUTPUT
          echo "rds_identifier=$(terraform output -raw rds_identifier)" >> $GITHUB_OUTPUT
          echo "private_subnets=$(terraform output -json private_subnets | jq -c '.')" >> $GITHUB_OUTPUT
          echo "ecs_security_group_id=$(terraform output -raw ecs_security_group_id)" >> $GITHUB_OUTPUT


# ─────────────────────────────
# 3. BUILD & PUSH IMAGE
# ─────────────────────────────
  build:
    needs: terraform
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build.outputs.image }}

    env:
      ECR_REPO: ${{ needs.terraform.outputs.ecr_repo }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        id: build
        run: |
          IMAGE="${ECR_REPO}:${GITHUB_SHA}"

          echo "Building image: $IMAGE"

          docker build ./backend -t "$IMAGE"
          docker tag "$IMAGE" "${ECR_REPO}:latest"
          docker push "${ECR_REPO}:latest"

          echo "image=$IMAGE" >> $GITHUB_OUTPUT


# ─────────────────────────────
# 4. MIGRATION
# ─────────────────────────────
  migrate:
    needs: [terraform, build]
    runs-on: ubuntu-latest

    env:
      ECS_CLUSTER: ${{ needs.terraform.outputs.ecs_cluster }}
      RDS_ID: ${{ needs.terraform.outputs.rds_identifier }}
      APP_NAME: emp-mgmt

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Wait for RDS
        run: |
          aws rds wait db-instance-available \
            --db-instance-identifier "$RDS_ID"

      - name: Run migration task in ECS
        run: |
          set -e

          SUBNETS=$(echo '${{ needs.terraform.outputs.private_subnets }}' | jq -r '. | join(",")')
          SG="${{ needs.terraform.outputs.ecs_security_group_id }}"

          echo "Subnets: $SUBNETS"
          echo "SG: $SG"

          aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition ${APP_NAME}-task \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"app","command":["npm","run","migrate"]}]}'

# ─────────────────────────────
# 5. DEPLOY (BACKEND)
# ─────────────────────────────
  deploy:
    needs: [terraform, build, migrate]
    runs-on: ubuntu-latest

    env:
      ECS_CLUSTER: ${{ needs.terraform.outputs.ecs_cluster }}
      ECS_SERVICE: ${{ needs.terraform.outputs.ecs_service }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment


# ─────────────────────────────
# 6. FRONTEND DEPLOY (S3) 
# ─────────────────────────────
  frontend:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist s3://emp-mgmt-frontend --delete